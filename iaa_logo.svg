<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Graduation Cap / Roof on top -->
  <path d="M 100 20 L 145 35 L 140 43 L 100 32 L 60 43 L 55 35 Z" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <rect x="85" y="32" width="30" height="15" fill="none" stroke="#ffffff" stroke-width="1.5" />
  <path d="M 68 47 L 132 47 L 140 55 L 60 55 Z" fill="none" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Outer Shield Boundary -->
  <path d="M 60 55 L 140 55 L 148 100 C 148 135 100 155 100 155 C 100 155 52 135 52 100 Z" fill="none" stroke="#ffffff" stroke-width="2" />
  
  <!-- "IAA" Text -->
  <text x="100" y="80" font-family="'Arial', sans-serif" font-weight="700" font-size="22" fill="#ffffff" text-anchor="middle" letter-spacing="1">IAA</text>
  
  <!-- Mount Meru Outline -->
  <path d="M 70 110 L 85 98 L 92 104 L 102 92 L 108 97 L 115 90 L 130 110 Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" />
  <line x1="66" y1="110" x2="134" y2="110" stroke="#ffffff" stroke-width="2" />
  
  <!-- Open Book at the bottom -->
  <path d="M 100 134 C 95 130 87 130 80 132 L 80 120 C 87 118 95 118 100 122" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 100 134 C 105 130 113 130 120 132 L 120 120 C 113 118 105 118 100 122" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" />
  <line x1="100" y1="122" x2="100" y2="134" stroke="#ffffff" stroke-width="1.5" />
  
  <!-- Ribbons / Scrolls around shield -->
  <path d="M 52 90 L 35 115 C 38 128 55 145 92 158" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.15" />
  <path d="M 148 90 L 165 115 C 162 128 145 145 108 158" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" opacity="0.15" />
  
  <path d="M 52 90 L 35 115 C 38 128 55 145 92 158" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" />
  <path d="M 148 90 L 165 115 C 162 128 145 145 108 158" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" />

  <!-- White text inside scrolls -->
  <path id="leftScrollText" d="M 36 106 C 38 120 54 135 88 148" fill="none" stroke="none" />
  <path id="rightScrollText" d="M 164 106 C 162 120 146 135 112 148" fill="none" stroke="none" />
  
  <text font-family="'Arial', sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff">
    <textPath href="#leftScrollText" startOffset="5%">EXCELLENCE AND</textPath>
  </text>
  <text font-family="'Arial', sans-serif" font-size="7.5" font-weight="bold" fill="#ffffff">
    <textPath href="#rightScrollText" startOffset="5%">PROFESSIONALISM</textPath>
  </text>
  
  <!-- Ribbon red accents rendered as white stripes in the line-art version -->
  <line x1="42" y1="68" x2="49" y2="68" stroke="#ffffff" stroke-width="1.5" />
  <line x1="40" y1="73" x2="47" y2="73" stroke="#ffffff" stroke-width="1.5" />
  <line x1="38" y1="78" x2="45" y2="78" stroke="#ffffff" stroke-width="1.5" />
  
  <line x1="158" y1="68" x2="151" y2="68" stroke="#ffffff" stroke-width="1.5" />
  <line x1="160" y1="73" x2="153" y2="73" stroke="#ffffff" stroke-width="1.5" />
  <line x1="162" y1="78" x2="155" y2="78" stroke="#ffffff" stroke-width="1.5" />
</svg>
